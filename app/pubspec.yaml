name: codesapiens
description: A university attendance and timetable management app
publish_to: "none"
version: 1.0.5+5

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Image & File Handling
  image_picker: ^1.2.1
  file_picker: ^11.0.2

  # Local Storage
  shared_preferences: ^2.2.2

  # HTTP & API
  http: ^1.1.2

  # State Management
  provider: ^6.1.5+1

  # Google Sign In
  google_sign_in: ^7.2.0

  # Firebase (for authentication and storage)
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  firebase_storage: ^13.4.3
  firebase_app_check: ^0.4.5
  firebase_performance: ^0.11.4+3
  firebase_crashlytics: ^5.2.4

  # UI Components
  smooth_page_indicator: ^2.0.1
  flutter_svg: ^2.2.4
  cached_network_image: ^3.3.1

  # Utilities
  intl: ^0.20.3
  uuid: ^4.3.3
  url_launcher: ^6.2.3
  flutter_markdown_plus: ^1.0.7
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/wave_texture.svg
    - assets/images/halftone.png

  # Fonts are commented out until you download them
  # Run ./setup_fonts.sh to download fonts, then uncomment below
