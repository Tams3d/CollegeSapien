name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
    paths:
      - 'app/**'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true
      - name: Install dependencies
        working-directory: app
        run: flutter pub get
      - name: Build Flutter web
        working-directory: app
        run: flutter build web --release
      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcloud.json
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_COLLEGESAPIENS }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
          OUTPUT=$(npx firebase-tools@latest deploy --only hosting:app1 --project collegesapiens --json 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "is the current active version"; then
            echo "Site already up to date, nothing to deploy."
          elif echo "$OUTPUT" | grep -q '"status": "success"'; then
            echo "Deploy succeeded."
          else
            echo "Deploy failed."
            exit 1
          fi
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
