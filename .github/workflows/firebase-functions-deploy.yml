name: Deploy Firebase Functions on merge

on:
  workflow_dispatch:

jobs:
  deploy_functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/functions/package-lock.json
      - name: Install dependencies
        working-directory: server/functions
        run: npm ci
      - name: Build
        working-directory: server/functions
        run: npm run build
      - name: Deploy to Firebase Functions
        working-directory: server
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcloud.json
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_COLLEGESAPIENS }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx firebase-tools@latest deploy --only functions --project collegesapiens --non-interactive
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
