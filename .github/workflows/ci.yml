name: CI

on:
  push:
  pull_request:

jobs:
  admin-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: admin/pnpm-lock.yaml
      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.1
      - name: Install dependencies
        working-directory: admin
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: admin
        run: pnpm lint:eslint
      - name: Build
        working-directory: admin
        run: pnpm build

  server-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: server/functions/pnpm-lock.yaml
      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.1
      - name: Install dependencies
        working-directory: server/functions
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: server/functions
        run: pnpm lint
      - name: Build
        working-directory: server/functions
        run: pnpm build

  app-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        working-directory: app
        run: flutter pub get
      - name: Analyze
        working-directory: app
        run: flutter analyze
      - name: Test
        working-directory: app
        run: flutter test
