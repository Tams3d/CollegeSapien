name: Feature request
description: Suggest an idea or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: app
    attributes:
      label: Target area
      options:
        - Admin (Nuxt)
        - Server (API)
        - Mobile App (Flutter)
        - Docs
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or change you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you've considered.
    validations:
      required: false
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who benefits and how?
    validations:
      required: false
